<!DOCTYPE html>
<html>
<head>
<title>AI Photo Enhancer</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b,#6366f1);
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{font-size:22px;font-weight:bold;}

.nav a{margin-left:20px;color:#e2e8f0;}

.btn{
  background:#6366f1;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* HERO */
.hero{text-align:center;padding:40px;}

.hero h1{font-size:40px;}

.upload{
  margin-top:20px;
}

/* COMPARE */
.compare{
  position:relative;
  width:600px;
  margin:40px auto;
}

.compare img{
  width:100%;
  border-radius:15px;
}

.after{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.slider{
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:white;
  cursor:pointer;
}

.circle{
  position:absolute;
  top:50%;
  left:-10px;
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
}

/* LOADER */
.loader{
  display:none;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="nav">
  <div class="logo">⚡ AI Studio</div>
  <div>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="login.html">Login</a>
  </div>
</div>

<div class="hero">

<h1>Enhance Photos in 5 Seconds</h1>

<input type="file" id="file" class="upload">
<button class="btn" onclick="enhance()">Enhance</button>

<div class="loader" id="loader">⏳ Processing...</div>

<div class="compare" id="compare" style="display:none;">
  <img id="before">

  <div class="after" id="after">
    <img id="afterImg">
  </div>

  <div class="slider" id="slider">
    <div class="circle"></div>
  </div>
</div>

</div>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html";
}

const slider = document.getElementById("slider");
const after = document.getElementById("after");

let isDown = false;

slider.onmousedown = () => isDown = true;
window.onmouseup = () => isDown = false;

window.onmousemove = (e) => {
  if (!isDown) return;

  let rect = slider.parentElement.getBoundingClientRect();
  let x = e.clientX - rect.left;

  if(x<0) x=0;
  if(x>rect.width) x=rect.width;

  slider.style.left = x + "px";
  after.style.width = x + "px";
}

async function enhance(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Upload image");

  const reader = new FileReader();

  reader.onload = async function(){
    document.getElementById("loader").style.display="block";

    const res = await fetch("/api/enhance",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({image: reader.result})
    });

    const data = await res.json();

    document.getElementById("loader").style.display="none";

    if(data.error){
      alert(JSON.stringify(data.error));
      return;
    }

    document.getElementById("compare").style.display="block";
    document.getElementById("before").src = reader.result;
    document.getElementById("afterImg").src = data.output;
  }

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
